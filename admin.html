<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생마술 | 관리자 - 공연 히스토리 편집기</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
</head>

<body style="min-height: 100vh; display: flex; flex-direction: column;">

    <!-- INTEGRATED HEADER NAV -->
    <header></header>

    <!-- ADMIN PANEL BODY -->
    <main class="admin-page">
        <h2 class="section-title">히스토리 관리자</h2>

        <!-- 1. LOCKSCREEN FOR SECURITY (Firebase Authentication & Passcode) -->
        <div class="admin-lockscreen glass-panel" id="admin-lockscreen">
            <h3>관리자 로그인</h3>
            <p style="font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 20px;">
                게시물 추가/수정을 위해 Firebase 이메일과 비밀번호로 로그인해주세요.<br>
                (Firebase 연동 전에는 기존 패스코드 <strong class="gold-glow-text">magic123</strong> 입력으로 대체 가능합니다.)
            </p>
            <div class="admin-form-group" id="admin-email-group">
                <input type="email" id="admin-email-input" class="admin-input" placeholder="이메일을 입력하세요" style="margin-bottom: 12px;">
            </div>
            <div class="admin-form-group">
                <input type="password" id="passcode-input" class="admin-input" placeholder="비밀번호(또는 기존 패스코드)를 입력하세요">
            </div>
            <button type="button" class="btn-gold" id="lock-submit-btn" style="width: 100%;">인증 및 로그인</button>
        </div>

        <!-- 2. MAIN DASHBOARD CONTENT (Hidden until auth) -->
        <div class="admin-dashboard" id="admin-dashboard">

            <!-- SUB TABS & LOGOUT BUTTON LAYOUT -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 20px;">
                <div class="tab-nav-container" style="max-width: 500px; margin: 0;">
                    <button class="tab-btn active" data-tab="admin-tab-history" id="btn-tab-history">공연 히스토리 관리</button>
                    <button class="tab-btn" data-tab="admin-tab-inquiry" id="btn-tab-inquiry">문의글 목록 조회</button>
                </div>
                <button type="button" class="btn-glass" id="admin-logout-btn" style="padding: 10px 20px; font-size: 0.9rem; border-color: rgba(255, 77, 77, 0.4); color: #ff4d4d;">로그아웃</button>
            </div>

            <!-- Tab 1: History Management -->
            <div class="tab-content active" id="admin-tab-history" style="max-width: 100%; padding: 0;">
                <div class="admin-grid-layout">

                    <!-- Left: Form to Add Post -->
                    <div class="glass-panel">
                        <div class="admin-card-header">
                            <span>새 공연 히스토리 등록</span>
                        </div>
                        <form class="admin-form" id="admin-form">

                            <!-- Program Select -->
                            <div class="admin-form-group">
                                <label for="admin-post-prog">공연 작품 종류</label>
                                <select id="admin-post-prog" class="admin-select" required>
                                    <option value="">작품 선택</option>
                                    <option value="매직벌룬쇼">매직벌룬쇼</option>
                                    <option value="LED매직쇼">LED매직쇼</option>
                                    <option value="매직버블쇼">매직버블쇼</option>
                                    <option value="매직버블벌룬쇼">매직버블벌룬쇼</option>
                                    <option value="제리 아저씨의 화이트 매직 크리스마스">제리 아저씨의 화이트 매직 크리스마스</option>
                                    <option value="반짝반짝 빛나는 마술사의 방">반짝반짝 빛나는 마술사의 방</option>
                                    <option value="반짝반짝 빛나는 마술사의 방: 크리스마스의 비밀">반짝반짝 빛나는 마술사의 방: 크리스마스의 비밀</option>
                                    <option value="안녕, 낯선이">안녕, 낯선이</option>
                                    <option value="〈당신 앞으로 도착한 공연〉">〈당신 앞으로 도착한 공연〉</option>
                                    <option value="패밀리 매직 페스티벌">패밀리 매직 페스티벌</option>
                                    <option value="버블 체험">버블 체험</option>
                                    <option value="마술 강의">마술 강의</option>
                                    <option value="직업 강의">직업 강의</option>
                                    <option value="장비 렌탈">장비 렌탈</option>
                                </select>
                            </div>

                            <!-- Date & Location -->
                            <div class="inquiry-grid-2col" style="gap: 15px;">
                                <div class="admin-form-group">
                                    <label for="admin-post-date">공연 날짜</label>
                                    <input type="date" id="admin-post-date" class="admin-input" style="margin-bottom: 0;"
                                        required>
                                </div>
                                <div class="admin-form-group">
                                    <label for="admin-post-loc">공연 장소 (도시/회관)</label>
                                    <input type="text" id="admin-post-loc" class="admin-input" placeholder="예: 서울 마포아트센터"
                                        style="margin-bottom: 0;" required>
                                </div>
                            </div>

                            <!-- Post Title -->
                            <div class="admin-form-group">
                                <label for="admin-post-title">포스트 제목 (작품/일시/장소 반영 권장)</label>
                                <input type="text" id="admin-post-title" class="admin-input"
                                    placeholder="예: 강남 초등학교 어린이 마술 성료!" required>
                            </div>

                            <!-- Post Image (Base64 file converter) -->
                            <div class="admin-form-group">
                                <label>공연 사진 파일 (정방형 또는 가로 권장)</label>
                                <div class="admin-file-custom">
                                    <span id="file-label-text">여기를 눌러 사진 선택</span>
                                    <input type="file" id="admin-post-file" class="admin-file-input" accept="image/*">
                                </div>
                                <!-- Image preview -->
                                <div id="image-preview-box" style="margin-top: 15px; display: none; text-align: center;">
                                    <img id="image-preview" src="" alt="미리보기"
                                        style="max-height: 150px; border-radius: 8px; border: var(--border-glass);">
                                </div>
                            </div>

                            <!-- Post content description -->
                            <div class="admin-form-group">
                                <label for="admin-post-desc">공연 후기 및 세부 성과</label>
                                <textarea id="admin-post-desc" class="admin-input admin-textarea"
                                    placeholder="관객 반응, 공연 관련 에피소드 등 상세 후기를 적어주세요." required></textarea>
                            </div>

                            <button type="submit" class="btn-gold" style="width: 100%; margin-top: 10px;">공연 등록하기</button>
                        </form>
                    </div>

                    <!-- Right: List of Current Posts to Delete -->
                    <div class="glass-panel" style="display: flex; flex-direction: column;">
                        <div class="admin-card-header">
                            <span>현재 등록된 공연 목록</span>
                            <span id="posts-count" class="gold-glow-text" style="font-size: 0.9rem;">0개</span>
                        </div>
                        <div class="admin-list-box" id="admin-list-box">
                            <!-- Dynamic List loaded here -->
                        </div>
                    </div>

                    <!-- Bottom panel: Data Export/Import for permanence -->
                    <div class="admin-backup-panel glass-panel">
                        <div
                            style="margin-right: auto; align-self: center; font-size: 0.85rem; color: var(--color-text-muted);">
                            ※ 데이터는 브라우저 내부(localStorage)에 보관되므로 컴퓨터 변경 시 백업 버튼을 활용해 옮길 수 있습니다.
                        </div>
                        <button type="button" class="btn-glass" id="admin-export-btn"
                            style="padding: 8px 18px; font-size: 0.85rem;">데이터 백업하기 (JSON)</button>
                        <div class="btn-gold"
                            style="position: relative; padding: 8px 18px; font-size: 0.85rem; cursor: pointer; color: var(--color-bg-dark);">
                            데이터 불러오기
                            <input type="file" id="admin-import-file" accept=".json"
                                style="position: absolute; inset: 0; opacity: 0; cursor: pointer;">
                        </div>
                    </div>

                </div>
            </div>

            <!-- Tab 2: Inquiry List Viewer -->
            <div class="tab-content" id="admin-tab-inquiry" style="max-width: 100%; padding: 0;">
                <div class="glass-panel" style="padding: 30px; margin-bottom: 30px;">
                    <div class="admin-card-header" style="padding: 0 0 20px 0; margin-bottom: 20px; border-bottom: var(--border-glass);">
                        <span>신청된 공연 문의 목록</span>
                        <span id="inquiries-count" class="gold-glow-text" style="font-size: 0.9rem;">0개</span>
                    </div>
                    
                    <div class="admin-list-box" id="admin-inquiry-list" style="max-height: 700px;">
                        <!-- Dynamic Inquiries loaded here -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- INTEGRATED FOOTER -->
    <footer style="margin-top: auto;"></footer>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase.js"></script>
    <!-- Global Javascript -->
    <script src="main.js"></script>
</body>

</html>
