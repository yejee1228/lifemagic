<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생마술 | 히스토리 - 생생한 공연 실적 게시판</title>
    <meta name="description"
        content="인생마술이 전국 각지에서 관객들과 호흡했던 마법 같은 순간들을 공유합니다. 최근 진행된 생생한 마술 공연 일정, 장소, 생생한 후기를 사진과 함께 만나보세요.">
    <link rel="stylesheet" href="style.css">
</head>

<body class="hist-bg" style="min-height: 100vh;">

    <!-- INTEGRATED HEADER NAV -->
    <header></header>

    <!-- HISTORY MAIN CONTENT -->
    <main class="history-page">
        <h2 class="section-title">공연 히스토리</h2>

        <div class="history-intro-box">
            <p>
                인생마술은 관객과 무대가 하나가 되는 찰나의 마법을 지향합니다.<br>
                전국 곳곳의 무대 위에서 펼쳐진 소중하고 경이로운 마술 기록들을 게시판으로 만나보세요.
            </p>
        </div>

        <div class="history-board-container">
            <!-- DYNAMIC GRID CONTAINER -->
            <div class="history-grid" id="history-grid">
                <!-- Javascript will dynamically inject articles here. 
                     If no custom data is in localStorage, pre-populated stunning items will appear. -->
            </div>
        </div>
    </main>

    <!-- DETAILED MODAL OVERLAY -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box glass-panel" id="modal-box">
            <button class="modal-close-btn" id="modal-close" aria-label="닫기">✕</button>
            <div class="modal-img-container" id="modal-img-container">
                <!-- Dynamic Image -->
            </div>
            <div class="modal-body">
                <div class="modal-meta" id="modal-meta">
                    <!-- Dynamic Date / Location -->
                </div>
                <h3 class="modal-title" id="modal-title">
                    <!-- Dynamic Title -->
                </h3>
                <p class="modal-content-text" id="modal-content-text">
                    <!-- Dynamic content -->
                </p>
            </div>
        </div>
    </div>

    <!-- INTEGRATED FOOTER -->
    <footer></footer>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase.js"></script>
    <!-- Global Javascript -->
    <script src="main.js"></script>
</body>

</html>
